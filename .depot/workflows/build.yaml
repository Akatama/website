# Depot CI Migration
# Source: .github/workflows/deploy.yaml
#
# Changes made:
# - Changed GitHub runs-on labels to their Depot equivalents

name: Test-Build
on: push
jobs:
  run-test:
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    steps:
      - uses: actions/checkout@v6
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: uv run pytest
  build-container:
    needs: run-test
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    permissions:
      # required for allowing the workflow to request and use an OIDC token for an action or step
      # specifically, we need the below set for aws-actions/configure-aws-credentials@v4
      id-token: write
      contents: read # required for actions/checkout
    steps:
      - uses: actions/checkout@v6
      - uses: depot/setup-action@v1

      - name: Login to Depot Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: x-token
          password: ${{ secrets.DEPOT_TOKEN }}

      - name: Build image
        uses: depot/build-push-action@v1
        env:
          IMAGE_TAG: ${{ github.ref_name == 'main' && 'latest' || github.ref_name }}
        with:
          token: ${{ secrets.DEPOT_TOKEN }}
          push: true
          tags: |
            ${{ vars.REGISTRY_URL }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}
            ${{ vars.REGISTRY_URL }}/${{ vars.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
